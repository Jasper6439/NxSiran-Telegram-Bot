<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>恋爱至上主义区域 - Love Supremacy Zone</title>
    <link rel="stylesheet" href="/static/game/css/game.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💕</text></svg>">
</head>
<body>

<!-- ===== Loading Screen ===== -->
<div id="loading-screen">
    <h1>💕 恋爱至上主义区域</h1>
    <div class="loading-spinner"></div>
    <p style="margin-top: 16px; color: rgba(255,255,255,0.5); font-size: 13px;">穿越世界中...</p>
</div>

<!-- ===== World Layer Indicator ===== -->
<div id="world-layer-indicator" class="world-layer-indicator">
  <span class="layer-icon">📖</span>
  <span class="layer-name">剧本区</span>
</div>

<!-- ===== Game Viewport ===== -->
<div id="game-viewport">
    <div id="game-world">
        <!-- Game entities rendered here by renderer.js -->
    </div>
</div>

<!-- ===== Weather Effects ===== -->
<div id="weather-effects"></div>

<!-- ===== HUD (Top) ===== -->
<div id="game-hud">
    <div class="hud-left">
        <div class="hud-item">
            <span class="hud-icon" id="weather-icon">☀️</span>
            <span id="weather-name">晴天</span>
        </div>
        <div class="hud-item">
            <span id="game-day">第 1 天</span>
            <span id="game-season">春</span>
        </div>
    </div>
    <div class="hud-right">
        <div class="hud-item">
            <span class="hud-icon">💰</span>
            <span class="hud-value" id="hud-money">500</span>
        </div>
        <div class="hud-item">
            <span class="hud-icon">♥</span>
            <span class="hud-value" id="hud-hearts">0</span>
        </div>
        <span id="event-hint" style="display:none;">💕 有新事件</span>
    </div>
</div>

<!-- ===== Emotion Values Panel ===== -->
<div id="emotion-panel" class="emotion-panel">
  <div class="emotion-title">车如云</div>
  <div class="emotion-bar">
    <span class="emotion-label">好感度</span>
    <div class="emotion-progress"><div id="affection-bar" style="width: 0%"></div></div>
    <span id="affection-value">0</span>
  </div>
  <div class="emotion-bar">
    <span class="emotion-label">幸福度</span>
    <div class="emotion-progress"><div id="happiness-bar" style="width: 50%"></div></div>
    <span id="happiness-value">50</span>
  </div>
  <div class="emotion-bar">
    <span class="emotion-label">觉醒度</span>
    <div class="emotion-progress"><div id="awakening-bar" style="width: 0%"></div></div>
    <span id="awakening-value">0</span>
  </div>
</div>

<!-- ===== Toolbar (Bottom) ===== -->
<div id="toolbar">
    <!-- Populated by inventory.js -->
</div>

<!-- ===== D-Pad (Mobile) ===== -->
<div id="dpad">
    <button class="dpad-btn dpad-up" onclick="GameActions.movePlayer('up')">▲</button>
    <button class="dpad-btn dpad-down" onclick="GameActions.movePlayer('down')">▼</button>
    <button class="dpad-btn dpad-left" onclick="GameActions.movePlayer('left')">◀</button>
    <button class="dpad-btn dpad-right" onclick="GameActions.movePlayer('right')">▶</button>
</div>

<!-- ===== Action Buttons (Right) ===== -->
<div id="action-buttons">
    <button class="action-fab" onclick="GameInventory.openShop()" title="商店">🏪</button>
    <button class="action-fab" onclick="GameInventory.openInventory()" title="背包">🎒</button>
</div>

<!-- ===== Shop Panel ===== -->
<div id="shop-panel" class="game-panel">
    <!-- Populated by inventory.js -->
</div>

<!-- ===== Inventory Panel ===== -->
<div id="inventory-panel" class="game-panel">
    <!-- Populated by inventory.js -->
</div>

<!-- ===== Dialogue Box ===== -->
<div id="dialogue-box">
    <!-- Populated by dialogue.js -->
</div>

<!-- ===== Event Modal ===== -->
<div id="event-modal">
    <!-- Populated by events.js -->
</div>

<!-- ===== Toast Container ===== -->
<div id="toast-container"></div>

<!-- ===== API Base (injected by server) ===== -->
<script>window.GAME_API_BASE = '__API_BASE__';</script>

<!-- ===== Scripts (order matters) ===== -->
<script src="/static/game/js/state.js?v=6"></script>
<script src="/static/game/js/terrain.js?v=6"></script>
<script src="/static/game/js/renderer_v2.js?v=6"></script>
<script src="/static/game/js/viewport.js?v=6"></script>
<script src="/static/game/js/actions.js?v=6"></script>
<script src="/static/game/js/inventory.js?v=6"></script>
<script src="/static/game/js/npc.js?v=6"></script>
<script src="/static/game/js/dialogue.js?v=6"></script>
<script src="/static/game/js/events.js?v=6"></script>
<script src="/static/game/js/time.js?v=6"></script>
<script src="/static/game/js/weather.js?v=6"></script>
<script src="/static/game/js/audio.js?v=6"></script>
<script src="/static/game/js/hud.js?v=6"></script>
<script src="/static/game/js/api.js?v=6"></script>
<script src="/static/game/js/sync.js?v=6"></script>
<script src="/static/game/js/main.js?v=6"></script>

</body>
</html>
