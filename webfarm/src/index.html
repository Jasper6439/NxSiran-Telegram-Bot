<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#A8DADC">
    
    <!-- Google Fonts: Nunito 圆润字体 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <title>WebFarm - 种田模拟游戏</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            overscroll-behavior: none;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        }
        
        body {
            /* 天空渐变背景（配合莫兰迪色系） */
            background: linear-gradient(180deg, #B8E0D2 0%, #A8DADC 40%, #95D5B2 100%);
            font-family: 'Nunito', -apple-system, BlinkMacSystemFont, sans-serif;
        }
        
        #game-container {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-tap-highlight-color: transparent;
        }
        
        #game-container canvas {
            display: block;
            touch-action: none;
            image-rendering: auto;
            border-radius: 16px;
            box-shadow: 0 12px 40px rgba(69, 123, 157, 0.25), 0 4px 12px rgba(0,0,0,0.1);
        }
        
        /* 加载画面 */
        #loading-screen {
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, #B8E0D2 0%, #A8DADC 50%, #95D5B2 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: opacity 0.6s ease;
        }
        
        #loading-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }
        
        #loading-screen h1 {
            color: #457B9D;
            font-size: 2.2rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            text-shadow: 0 2px 8px rgba(69,123,157,0.2);
        }
        
        #loading-screen p {
            color: #6B9CAE;
            font-size: 0.9rem;
            font-weight: 600;
        }
        
        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid rgba(255,255,255,0.4);
            border-top-color: #457B9D;
            border-radius: 50%;
            animation: spin 1s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite;
            margin-bottom: 1.2rem;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="loading-screen">
        <div class="spinner"></div>
        <h1>🌾 WebFarm</h1>
        <p>种植快乐...</p>
    </div>
    
    <div id="game-container"></div>
    
    <script>
        window.addEventListener('load', () => {
            setTimeout(() => {
                const loading = document.getElementById('loading-screen');
                if (loading) {
                    loading.classList.add('hidden');
                    setTimeout(() => loading.remove(), 600);
                }
            }, 1000);
        });
    </script>
    
    <script src="./model/FarmModel.js"></script>
    <script src="./scene/GameScene.js"></script>
    <script src="./main.js"></script>
</body>
</html>
